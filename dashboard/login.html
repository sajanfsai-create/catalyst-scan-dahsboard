<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tekki X | Organization Login</title>
    <meta name="theme-color" content="#1B5E20">
    
    <!-- Open Graph / SEO -->
    <meta property="og:title" content="Tekki X — CatalystScan Fleet Dashboard">
    <meta property="og:description" content="Central administration and health monitoring for your IT hardware fleet.">
    <meta property="og:image" content="logo.png">
    <meta property="og:type" content="website">
    <meta name="twitter:card" content="summary_large_image">
    
    <!-- PWA Manifest -->
    <link rel="manifest" href="manifest.json?v=2.3">
    <link rel="apple-touch-icon" href="logo.png">

    <link rel="stylesheet" href="styles.css?v=3.2">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: #070D0A;
            background-image:
                radial-gradient(ellipse at 20% 30%, rgba(27, 94, 32, 0.20) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 70%, rgba(249, 168, 37, 0.08) 0%, transparent 50%);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
        }
        .login-container {
            background: rgba(12, 22, 16, 0.70);
            border: 1px solid rgba(139, 195, 155, 0.10);
            backdrop-filter: blur(20px);
            border-radius: 20px;
            padding: 48px 40px;
            width: 100%;
            max-width: 440px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.6),
                        inset 0 1px 0 rgba(249, 168, 37, 0.08);
            text-align: center;
            animation: slideUp 0.5s ease forwards;
        }
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .login-container .brand-logo {
            width: 64px;
            height: 64px;
            margin: 0 auto 16px;
            background: linear-gradient(135deg, #1B5E20, #0A2E0F);
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            box-shadow: 0 8px 20px rgba(27, 94, 32, 0.35);
        }
        .login-container .brand-logo img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }
        .login-container h2 {
            font-family: 'Outfit', sans-serif;
            font-size: 24px;
            font-weight: 800;
            color: #f0f7f2;
            margin-bottom: 8px;
        }
        .login-container .subtitle {
            font-size: 14px;
            color: #8FA99A;
            margin-bottom: 32px;
        }
        .login-container input {
            display: block;
            width: 100%;
            padding: 14px 16px;
            background: rgba(7, 13, 10, 0.5);
            border: 1px solid rgba(139, 195, 155, 0.12);
            border-radius: 10px;
            color: #f0f7f2;
            font-size: 15px;
            font-family: inherit;
            outline: none;
            margin-bottom: 16px;
            transition: all 0.25s;
        }
        .login-container input:focus {
            border-color: #F9A825;
            box-shadow: 0 0 0 3px rgba(249, 168, 37, 0.25);
        }
        .login-container button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #1B5E20, #0A2E0F);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.25s;
            margin-top: 8px;
            box-shadow: 0 4px 15px rgba(27, 94, 32, 0.4);
        }
        .login-container button:hover {
            background: linear-gradient(135deg, #2E7D32, #1B5E20);
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(27, 94, 32, 0.6);
        }
        .login-container .footer-text {
            margin-top: 20px;
            font-size: 11px;
            color: #5C7A69;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="brand-logo"><img src="logo.png" alt="Tekki X" onerror="this.onerror=null; this.parentElement.innerHTML='⚡';"></div>
        <h2>Organization Login</h2>
        <div class="subtitle">Tekki X — CatalystScan Fleet Dashboard</div>
        <input type="text" id="org_name" placeholder="Organization Name (Username)">
        <input type="password" id="org_id" placeholder="Organization ID (Password)">
        <button onclick="attemptLogin()">🔐 Sign In</button>
        <p id="error-msg" style="color:#E53935; margin-top:12px; font-size:14px;"></p>
        <div class="footer-text">Tekki X · CatalystScan v2.2</div>
    </div>

    <script>
        async function attemptLogin() {
            const name = document.getElementById('org_name').value;
            const id = document.getElementById('org_id').value;

            // Call the server to verify if this Org Name + ID pair exists
            const response = await fetch('/api/dashboard/orgs');
            const data = await response.json();
            
            const match = data.organizations.find(o => o.name === name && o.org_id === id);

            if (match) {
                // Redirect to the org-specific dashboard
                window.location.href = `org_admin.html?org_id=${id}`;
            } else {
                document.getElementById('error-msg').innerText = "Invalid Organization Credentials";
            }
        }
    </script>
</body>
</html>
