<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CatalystScan | Organization Login</title>
    <meta name="theme-color" content="#0B1E4D">
    
    <!-- Open Graph / SEO -->
    <meta property="og:title" content="CatalystScan Fleet Dashboard">
    <meta property="og:description" content="Central administration and health monitoring for your IT hardware fleet.">
    <meta property="og:image" content="https://catalystscan.bostontechindia.in/dashboard/logo.png">
    <meta property="og:type" content="website">
    <meta name="twitter:card" content="summary_large_image">
    
    <!-- PWA Manifest -->
    <link rel="manifest" href="manifest.json?v=2.3">
    <link rel="apple-touch-icon" href="logo.png">

    <link rel="stylesheet" href="styles.css?v=2.3">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: #F8FAFC;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
        }
        .login-container {
            background: #ffffff;
            border: 1px solid #e2e8f0;
            border-radius: 14px;
            padding: 48px 40px;
            width: 100%;
            max-width: 440px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            text-align: center;
        }
        .login-container .brand-logo {
            width: 64px;
            height: 64px;
            margin: 0 auto 16px;
            background: linear-gradient(135deg, #0B1E4D, #0f766e);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            box-shadow: 0 8px 16px rgba(11, 30, 77, 0.25);
        }
        .login-container .brand-logo img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }
        .login-container h2 {
            font-family: 'Outfit', sans-serif;
            font-size: 24px;
            font-weight: 800;
            color: #1e293b;
            margin-bottom: 8px;
        }
        .login-container .subtitle {
            font-size: 14px;
            color: #64748b;
            margin-bottom: 32px;
        }
        .login-container input {
            display: block;
            width: 100%;
            padding: 14px 16px;
            background: #F8FAFC;
            border: 1px solid #e2e8f0;
            border-radius: 6px;
            color: #1e293b;
            font-size: 15px;
            font-family: inherit;
            outline: none;
            margin-bottom: 16px;
            transition: all 0.25s;
        }
        .login-container input:focus {
            border-color: #0f766e;
            box-shadow: 0 0 0 3px rgba(15, 118, 110, 0.12);
        }
        .login-container button {
            width: 100%;
            padding: 14px;
            background: #0f766e;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.25s;
            margin-top: 8px;
            box-shadow: 0 4px 6px rgba(11, 30, 77, 0.2);
        }
        .login-container button:hover {
            background: #0d5f59;
            transform: translateY(-1px);
            box-shadow: 0 6px 12px rgba(11, 30, 77, 0.3);
        }
        .login-container .footer-text {
            margin-top: 20px;
            font-size: 11px;
            color: #64748b;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="brand-logo"><img src="logo.png" alt="Boston Tech India" onerror="this.onerror=null; this.parentElement.innerHTML='⚡';"></div>
        <h2>Organization Login</h2>
        <div class="subtitle">CatalystScan Fleet Dashboard</div>
        <input type="text" id="org_name" placeholder="Organization Name (Username)">
        <input type="password" id="org_id" placeholder="Organization ID (Password)">
        <button onclick="attemptLogin()">🔐 Sign In</button>
        <p id="error-msg" style="color:#ef4444; margin-top:12px; font-size:14px;"></p>
        <div class="footer-text">BostonTechIndia · CatalystScan v2.1</div>
    </div>

    <script>
        async function attemptLogin() {
            const name = document.getElementById('org_name').value;
            const id = document.getElementById('org_id').value;

            // Call the server to verify if this Org Name + ID pair exists
            const response = await fetch('/api/dashboard/orgs');
            const data = await response.json();
            
            const match = data.organizations.find(o => o.name === name && o.org_id === id);

            if (match) {
                // Redirect to the org-specific dashboard
                window.location.href = `org_admin.html?org_id=${id}`;
            } else {
                document.getElementById('error-msg').innerText = "Invalid Organization Credentials";
            }
        }
    </script>
</body>
</html>
