version: "3.9"

services:
  # ── MySQL Database (Fresh — uses separate volume from old catalystscan) ──
  mysql:
    image: mysql:8.0
    container_name: tekkix-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - tekkix_mysql_data:/var/lib/mysql
    ports:
      - "127.0.0.1:3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - tekkix-net

  # ── TekkiX CatalystScan App ──
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: tekkix-app
    restart: unless-stopped
    env_file: .env
    environment:
      MYSQL_HOST: mysql
    ports:
      - "8798:9000"
    volumes:
      - ./logs:/app/logs
      - ./reports:/app/reports
      - ./uploads:/app/uploads
      - ./generated_builds:/app/generated_builds
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - tekkix-net

volumes:
  tekkix_mysql_data:

networks:
  tekkix-net:
    driver: bridge
