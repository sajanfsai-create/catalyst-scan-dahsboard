name: Deploy to GCP VM

on:
  push:
    branches:
      - main          # Deploy on every push to main
      - master        # Also support master branch

jobs:
  deploy:
    name: SSH Deploy & Rebuild Docker
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout code (needed for any pre-deploy steps) ──
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Authenticate to Google Cloud ──
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      # ── 3. Set up gcloud CLI ──
      - name: Set up gcloud CLI
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ secrets.GCP_PROJECT_ID }}

      # ── 4. SSH into VM and deploy ──
      - name: Deploy to VM via IAP SSH
        run: |
          gcloud compute ssh ${{ secrets.GCP_VM_NAME }} \
            --zone=${{ secrets.GCP_VM_ZONE }} \
            --tunnel-through-iap \
            --project=${{ secrets.GCP_PROJECT_ID }} \
            --command='
              set -e

              echo "=== [1/5] Pulling latest code ==="
              cd /opt/catalystscan
              git fetch origin
              git reset --hard origin/$(git rev-parse --abbrev-ref HEAD)

              echo "=== [2/5] Rebuilding Docker image ==="
              docker compose build --no-cache app

              echo "=== [3/5] Restarting app container ==="
              docker compose up -d --no-deps app

              echo "=== [4/5] Removing dangling images ==="
              docker image prune -f

              echo "=== [5/5] Verifying health ==="
              sleep 5
              curl -sf http://localhost:9000/api/health && echo "✅ App is healthy" || echo "⚠️  Health check failed — check logs"
            '
